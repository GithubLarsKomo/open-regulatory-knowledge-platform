name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run specification linter (strict mode)
        run: python tools/spec_linter.py --path . --report TRACEABILITY/lint_report.md --strict

      - name: Run backlog generator
        run: python tools/backlog_generator.py --path . --output-dir TRACEABILITY --task-md

      - name: Verify generated files are up-to-date
        run: |
          git diff --exit-code TASK.md TRACEABILITY/backlog.md TRACEABILITY/backlog.csv TRACEABILITY/Requirements.csv TRACEABILITY/lint_report.md \
            && echo "✅ All generated files are up-to-date." \
            || { echo "::error ::Generated files are out of date. Re-run make quality locally and commit the changes."; exit 1; }
        shell: bash